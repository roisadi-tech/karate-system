<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Presenças</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <h1 class="mb-4">
                Controle de Presença
            </h1>

            <form method="POST">

                <div class="row">

                    <div class="col-md-4">

                        <label>Aluno</label>

                        <select
                            name="aluno_id"
                            class="form-control"
                        >

                            {% for aluno in alunos %}

                            <option value="{{ aluno[0] }}">
                                {{ aluno[1] }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-3">

                        <label>Data</label>

                        <input
                            type="date"
                            name="data"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Status</label>

                        <select
                            name="status"
                            class="form-control"
                        >

                            <option>PRESENTE</option>
                            <option>FALTOU</option>

                        </select>

                    </div>

                    <div class="col-md-2 d-flex align-items-end">

                        <button class="btn btn-primary w-100">
                            Salvar
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <h3 class="mb-4">
                Histórico
            </h3>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Aluno</th>
                        <th>Data</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>

                    {% for presenca in presencas %}

                    <tr>

                        <td>{{ presenca[0] }}</td>
                        <td>{{ presenca[1] }}</td>
                        <td>{{ presenca[2] }}</td>
                        <td>{{ presenca[3] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
