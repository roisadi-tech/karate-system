<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <title>Cobranças</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Cobranças Pendentes
    </h1>

    <!-- BOTÃO COBRAR TODOS -->
    <button
        onclick="cobrarTodos()"
        class="btn btn-danger mb-3"
    >
        Cobrar Todos
    </button>

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Aluno</th>
                <th>Valor</th>
                <th>Vencimento</th>
                <th>Ação</th>
            </tr>
        </thead>

        <tbody>

            {% for item in dados %}

            <tr>

                <td>{{ item[0] }}</td>
                <td>R$ {{ item[2] }}</td>
                <td>{{ item[3] }}</td>

                <td>

                    <!-- BOTÃO INDIVIDUAL COM CLASSE -->
                    <a
                        href="https://wa.me/55{{ item[1] }}?text=Olá {{ item[0] }}, sua mensalidade de R$ {{ item[2] }} está pendente. Vencimento: {{ item[3] }}"
                        target="_blank"
                        class="btn btn-success btn-sm link-whatsapp"
                    >
                        Cobrar
                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

<!-- SCRIPT COBRAR TODOS -->
<script>

function cobrarTodos() {

    const links = document.querySelectorAll('.link-whatsapp');

    links.forEach((link, index) => {

        setTimeout(() => {

            window.open(link.href, '_blank');

        }, index * 800);

    });

}

</script>

</body>
</html>
