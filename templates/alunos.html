<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Alunos</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h1>Alunos</h1>

        <div class="d-flex gap-2">

            <form
                method="GET"
                action="/alunos"
            >

                <div class="input-group">

                    <input
                        type="text"
                        name="busca"
                        class="form-control"
                        placeholder="Buscar aluno..."
                    >

                    <button class="btn btn-primary">
                        Buscar
                    </button>

                </div>

            </form>

            <a
                href="/cadastrar_aluno"
                class="btn btn-success"
            >
                Novo Aluno
            </a>

        </div>

    </div>

    <table class="table table-striped table-hover bg-white">

        <thead>

            <tr>

                <th>ID</th>
                <th>Foto</th>
                <th>Nome</th>
                <th>Faixa</th>
                <th>WhatsApp</th>
                <th>Mensalidade</th>
                <th>Ações</th>

            </tr>

        </thead>

        <tbody>

            {% for aluno in alunos %}

            <tr>

                <td>{{ aluno[0] }}</td>

                <td>

                    {% if aluno[8] %}

                        <img
                            src="/static/uploads/{{ aluno[8] }}"
                            width="60"
                            height="60"
                            style="
                                object-fit: cover;
                                border-radius: 50%;
                            "
                        >

                    {% endif %}

                </td>

                <td>{{ aluno[1] }}</td>

                <td>{{ aluno[5] }}</td>

                <td>{{ aluno[4] }}</td>

                <td>
                    R$ {{ aluno[6] }}
                </td>

                <td>

                    <a
                        href="/editar_aluno/{{ aluno[0] }}"
                        class="btn btn-warning btn-sm"
                    >
                        Editar
                    </a>

                    <a
                        href="/excluir_aluno/{{ aluno[0] }}"
                        class="btn btn-danger btn-sm"
                    >
                        Excluir
                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
