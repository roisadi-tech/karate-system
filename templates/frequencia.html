<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Frequência</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h1 class="mb-4">
                Relatório de Frequência
            </h1>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Total Aulas</th>
                        <th>Presenças</th>
                        <th>Frequência</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>

                    {% for item in relatorio %}

                    <tr>

                        <td>{{ item.nome }}</td>

                        <td>{{ item.total }}</td>

                        <td>{{ item.presentes }}</td>

                        <td>
                            {{ item.percentual }}%
                        </td>

                        <td>

                            {% if item.percentual >= 75 %}

                                <span class="badge bg-success">
                                    APTO EXAME
                                </span>

                            {% else %}

                                <span class="badge bg-danger">
                                    BAIXA FREQUÊNCIA
                                </span>

                            {% endif %}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
