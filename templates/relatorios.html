<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <title>Relatórios</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Relatórios da Academia
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card text-bg-primary mb-4">

                <div class="card-body">

                    <h5>Total de Alunos</h5>

                    <h2>
                        {{ total_alunos }}
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-bg-success mb-4">

                <div class="card-body">

                    <h5>Total Recebido</h5>

                    <h2>
                        R$ {{ recebido }}
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-bg-danger mb-4">

                <div class="card-body">

                    <h5>Total Pendente</h5>

                    <h2>
                        R$ {{ pendente }}
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <h4 class="mb-4">
                Alunos por Faixa
            </h4>

            <canvas id="graficoFaixas"></canvas>

        </div>

    </div>

</div>

<script>

const ctx = document.getElementById('graficoFaixas');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [

            {% for faixa in faixas %}
                '{{ faixa[0] }}',
            {% endfor %}

        ],

        datasets: [{

            label: 'Quantidade',

            data: [

                {% for faixa in faixas %}
                    {{ faixa[1] }},
                {% endfor %}

            ],

            borderWidth: 1

        }]

    },

    options: {

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});

</script>

</body>
</html>
