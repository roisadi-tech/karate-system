<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Exames de Faixa</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <h1 class="mb-4">
                Exames de Faixa
            </h1>

            <form method="POST">

                <div class="row">

                    <div class="col-md-2">

                        <label>Aluno</label>

                        <select
                            name="aluno_id"
                            class="form-control"
                        >

                            {% for aluno in alunos %}

                            <option value="{{ aluno[0] }}">
                                {{ aluno[1] }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-2">

                        <label>Faixa Atual</label>

                        <input
                            type="text"
                            name="faixa_atual"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-2">

                        <label>Nova Faixa</label>

                        <input
                            type="text"
                            name="nova_faixa"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-2">

                        <label>Data</label>

                        <input
                            type="date"
                            name="data_exame"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-2">

                        <label>Resultado</label>

                        <select
                            name="resultado"
                            class="form-control"
                        >
                            <option>APROVADO</option>
                            <option>REPROVADO</option>
                        </select>

                    </div>

                    <div class="col-md-2 d-flex align-items-end">

                        <button class="btn btn-primary w-100">
                            Salvar
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <h3 class="mb-4">
                Histórico de Exames
            </h3>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Aluno</th>
                        <th>Faixa Atual</th>
                        <th>Nova Faixa</th>
                        <th>Data</th>
                        <th>Resultado</th>
                    </tr>
                </thead>

                <tbody>

                    {% for exame in exames %}

                    <tr>

                        <td>{{ exame[0] }}</td>
                        <td>{{ exame[1] }}</td>
                        <td>{{ exame[2] }}</td>
                        <td>{{ exame[3] }}</td>
                        <td>{{ exame[4] }}</td>

                        <td>

                            {% if exame[5] == 'APROVADO' %}

                                <span class="badge bg-success">
                                    APROVADO
                                </span>

                            {% else %}

                                <span class="badge bg-danger">
                                    REPROVADO
                                </span>

                            {% endif %}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
