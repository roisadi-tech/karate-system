<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Cadastrar Aluno</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h1 class="mb-4">
                Novo Aluno
            </h1>

            <form
                method="POST"
                enctype="multipart/form-data"
            >

                <div class="row">

                    <div class="col-md-4">

                        <label>Nome</label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-2">

                        <label>Nascimento</label>

                        <input
                            type="date"
                            name="nascimento"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Responsável</label>

                        <input
                            type="text"
                            name="responsavel"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>WhatsApp</label>

                        <input
                            type="text"
                            name="whatsapp"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-3">

                        <label>Faixa</label>

                        <input
                            type="text"
                            name="faixa"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Mensalidade</label>

                        <input
                            type="number"
                            step="0.01"
                            name="mensalidade"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Foto</label>

                        <input
                            type="file"
                            name="foto"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3 d-flex align-items-end">

                        <button class="btn btn-success w-100">
                            Salvar Aluno
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
