<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Academia Karatê</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">

        <div class="container d-flex justify-content-between">

            <span class="navbar-brand mb-0 h1">
                Sistema Academia Karatê
            </span>

            <div class="d-flex gap-2">

                <a
                    href="/"
                    class="btn btn-outline-light btn-sm"
                >
                    Dashboard
                </a>

                <a
                    href="/alunos"
                    class="btn btn-outline-light btn-sm"
                >
                    Alunos
                </a>

                <a
                    href="/presencas"
                    class="btn btn-outline-light btn-sm"
                >
                    Presenças
                </a>

                <a
                    href="/frequencia"
                    class="btn btn-outline-light btn-sm"
                >
                    Frequência
                </a>

                <a
                    href="/mensalidades"
                    class="btn btn-outline-light btn-sm"
                >
                    Mensalidades
                </a>

                <a
                    href="/exames"
                    class="btn btn-outline-light btn-sm"
                >
                    Exames
                </a>

                <a
                    href="/logout"
                    class="btn btn-danger btn-sm"
                >
                    Sair
                </a>

                <a
                    href="/backup"
                    class="btn btn-info btn-sm"
                >
                    Backup
                </a>

                <a
                    href="/relatorios"
                    class="btn btn-secondary btn-sm"
                >
                    Relatórios
                </a>

                <a
                   href="/cobrar"
                   class="btn btn-warning btn-sm"
                >
                    Cobranças
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h1 class="mb-4">
                    Dashboard
                </h1>

                <div class="row">

                    <div class="col-md-3">

                        <div class="card text-bg-primary mb-3">

                            <div class="card-body">

                                <h5>Total Alunos</h5>

                                <h2>
                                    {{ total_alunos }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-success mb-3">

                            <div class="card-body">

                                <h5>Faturamento</h5>

                                <h2>
                                    R$ {{ faturamento }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-warning mb-3">

                            <div class="card-body">

                                <h5>Aptos Exame</h5>

                                <h2>
                                    {{ aptos }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-danger mb-3">

                            <div class="card-body">

                                <h5>Inadimplentes</h5>

                                <h2>
                                    {{ inadimplentes }}
                                </h2>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
