<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Editar Aluno</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h1 class="mb-4">
                Editar Aluno
            </h1>

            <form
                method="POST"
                enctype="multipart/form-data"
            >

                <div class="text-center mb-4">

                    {% if aluno.foto %}

                        <img
                            src="/static/uploads/{{ aluno.foto }}"
                            width="120"
                            height="120"
                            style="
                                object-fit: cover;
                                border-radius: 50%;
                            "
                        >

                    {% endif %}

                </div>

                <div class="mb-3">

                    <label>Nome</label>

                    <input
                        type="text"
                        name="nome"
                        class="form-control"
                        value="{{ aluno.nome }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>Faixa</label>

                    <input
                        type="text"
                        name="faixa"
                        class="form-control"
                        value="{{ aluno.faixa }}"
                    >

                </div>

                <div class="mb-3">

                    <label>WhatsApp</label>

                    <input
                        type="text"
                        name="whatsapp"
                        class="form-control"
                        value="{{ aluno.whatsapp }}"
                    >

                </div>

                <div class="mb-3">

                    <label>Mensalidade</label>

                    <input
                        type="number"
                        step="0.01"
                        name="mensalidade"
                        class="form-control"
                        value="{{ aluno.mensalidade }}"
                    >

                </div>

                <div class="mb-3">

                    <label>Nova Foto</label>

                    <input
                        type="file"
                        name="foto"
                        class="form-control"
                    >

                </div>

                <button class="btn btn-success">
                    Atualizar
                </button>

                <a
                    href="/alunos"
                    class="btn btn-secondary"
                >
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
