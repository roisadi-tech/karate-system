<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Editar Aluno</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h1 class="mb-4">
                Editar Aluno
            </h1>

            <form method="POST">

                <div class="mb-3">
                    <label>Nome</label>

                    <input
                        type="text"
                        name="nome"
                        class="form-control"
                        value="{{ aluno[1] }}"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label>Faixa</label>

                    <input
                        type="text"
                        name="faixa"
                        class="form-control"
                        value="{{ aluno[5] }}"
                    >
                </div>

                <div class="mb-3">
                    <label>WhatsApp</label>

                    <input
                        type="text"
                        name="whatsapp"
                        class="form-control"
                        value="{{ aluno[4] }}"
                    >
                </div>

                <div class="mb-3">
                    <label>Mensalidade</label>

                    <input
                        type="number"
                        step="0.01"
                        name="mensalidade"
                        class="form-control"
                        value="{{ aluno[6] }}"
                    >
                </div>

                <button class="btn btn-success">
                    Atualizar
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
