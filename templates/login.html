<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div
    class="container d-flex justify-content-center align-items-center"
    style="height: 100vh;"
>

    <div
        class="card shadow-sm"
        style="width: 400px;"
    >

        <div class="card-body">

            <h2 class="mb-4 text-center">
                Login
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>Usuário</label>

                    <input
                        type="text"
                        name="usuario"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>Senha</label>

                    <input
                        type="password"
                        name="senha"
                        class="form-control"
                        required
                    >

                </div>

                <button class="btn btn-primary w-100">
                    Entrar
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
